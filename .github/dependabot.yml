version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Manila
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dependabot
    groups:
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:15'
      timezone: Asia/Manila
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot
      - github-actions
